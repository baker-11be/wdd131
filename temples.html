<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temple Album | WDD 131</title>
    <meta name="description" content="A responsive temple album page with hamburger menu navigation">
    <meta name="author" content="Baker Mfitundinda">
    
    <!-- Google Fonts - Correct Preconnect Links -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- CSS Links - Mobile First Approach -->
    <link rel="stylesheet" href="styles/temples.css">
    <link rel="stylesheet" href="styles/temples-large.css">
    
    <!-- Deferred JavaScript -->
    <script src="scripts/temples.js" defer></script>
</head>
<body>
    <header>
        <h1>Temple Album</h1>
        <button id="hamburger-btn" class="hamburger-btn" aria-label="Toggle navigation menu">☰</button>
        <nav id="main-nav" class="navigation">
            <ul>
                <li><a href="#" class="active">Home</a></li>
                <li><a href="#">Old</a></li>
                <li><a href="#">New</a></li>
                <li><a href="#">Large</a></li>
                <li><a href="#">Small</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h2>Home</h2>
        
        <div class="temple-grid">
            <figure>
                <img src="images/denverlsd-temple.webp" alt="Denver LDS Temple" loading="lazy" width="300" height="200">
                <figcaption>Denver LDS Temple</figcaption>
            </figure>

            <figure>
                <img src="images/laie-temple.webp" alt="Laie Temple" loading="lazy" width="300" height="200">
                <figcaption>Laie Temple</figcaption>
            </figure>

            <figure>
                <img src="images/nauvoo.webp" alt="Nauvoo Temple" loading="lazy" width="300" height="200">
                <figcaption>Nauvoo Temple</figcaption>
            </figure>

            <figure>
                <img src="images/new-nauvoo.webp" alt="New Nauvoo Temple" loading="lazy" width="300" height="200">
                <figcaption>New Nauvoo Temple</figcaption>
            </figure>

            <figure>
                <img src="images/newbeach-ldstemple.webp" alt="Newport Beach LDS Temple" loading="lazy" width="300" height="200">
                <figcaption>Newport Beach LDS Temple</figcaption>
            </figure>

            <figure>
                <img src="images/nukualofatonga-temple.webp" alt="Nuku'alofa Tonga Temple" loading="lazy" width="300" height="200">
                <figcaption>Nuku'alofa Tonga Temple</figcaption>
            </figure>

            <figure>
                <img src="images/rexburgidaho.webp" alt="Rexburg Idaho Temple" loading="lazy" width="300" height="200">
                <figcaption>Rexburg Idaho Temple</figcaption>
            </figure>

            <figure>
                <img src="images/preston-temple-bymunzerr.webp" alt="Preston Temple" loading="lazy" width="300" height="200">
                <figcaption>Preston Temple</figcaption>
            </figure>

            <figure>
                <img src="images/dc-temple.webp" alt="Washington D.C. Temple" loading="lazy" width="300" height="200">
                <figcaption>Washington D.C. Temple</figcaption>
            </figure>
        </div>
    </main>

    <footer>
        <p>&copy; <span id="current-year"></span> Temple Album | Baker Mfitundinda</p>
        <p>Last Modified: <span id="last-modified"></span></p>
    </footer>
</body>
</html>
